name: speedtest-tracker-server2
working_dir: docker-apps/speedtest-tracker
compose_files:
  - docker-compose.yml
env_files:
  - .env
  - ../../.doco-cd.env
reconciliation: true
polling:
  enabled: true
  interval: 1m

