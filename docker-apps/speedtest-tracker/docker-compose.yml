services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - APP_KEY=${APP_KEY}
      - APP_URL=http://localhost
      - DB_CONNECTION=sqlite
    volumes:
      - ${DATASET_ROOT:-.}/speedtest-tracker:/config
    ports:
      - "80:80"
    restart: unless-stopped
