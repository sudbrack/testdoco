services:
  influxdb:
    image: influxdb:2.7.3-alpine
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - ${DATASET_ROOT:-.}/influxdb/data:/var/lib/influxdb2
      - ${DATASET_ROOT:-.}/influxdb/config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=andrew
      - DOCKER_INFLUXDB_INIT_PASSWORD=andrew123456
      - DOCKER_INFLUXDB_INIT_ORG=server1
      - DOCKER_INFLUXDB_INIT_BUCKET=server1
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=andrew123456
    restart: unless-stopped
