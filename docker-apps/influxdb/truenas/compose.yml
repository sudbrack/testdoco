name: influxdb

services:
  influxdb:
    image: influxdb:2.7.12-alpine
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - /mnt/ssd-pool/influxdb/data:/var/lib/influxdb2
      - /mnt/ssd-pool/influxdb/config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=andrew
      - DOCKER_INFLUXDB_INIT_PASSWORD=andrew123456
      - DOCKER_INFLUXDB_INIT_ORG=truenas
      - DOCKER_INFLUXDB_INIT_BUCKET=truenas
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=andrew123456
    restart: unless-stopped
